workflows:
  android-build:
    name: JinocaFlix Android APK
    max_build_duration: 60
    
    environment:
      flutter: stable
      java: 17
      
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
          source: true

    scripts:
      - name: Atualizar arquitetura do Android (v1 para v2)
        script: |
          echo "Deletando pasta velha..."
          rm -rf android
          echo "Criando pasta nova atualizada..."
          flutter create --platforms android .
          
      - name: Ajustar o minSdkVersion para o Player de Video
        script: |
          echo "Buscando o arquivo do Gradle..."
          if [ -f "android/app/build.gradle.kts" ]; then
            echo "Arquivo Kotlin (.kts) encontrado. Trocando minSdk..."
            sed -i.bak 's/flutter.minSdkVersion/21/g' android/app/build.gradle.kts
          elif [ -f "android/app/build.gradle" ]; then
            echo "Arquivo Groovy (.gradle) encontrado. Trocando minSdkVersion..."
            sed -i.bak 's/flutter.minSdkVersion/21/g' android/app/build.gradle
          else
            echo "Erro: Arquivo build.gradle nao encontrado na pasta android/app/"
            exit 1
          fi
          
      - name: Baixar pacotes
        script: flutter pub get

      - name: Compilar o APK em modo Release
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
